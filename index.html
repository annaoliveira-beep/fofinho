<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pra você 💘</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 350px;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    h2 {
      margin: 10px 0;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff6b81;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff4757;
    }

    #msg {
      display: none;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="foto.jpg" alt="Nossa foto">

    <h2>Eu precisava te mostrar isso…</h2>
    <p>Não sei exatamente quando começou, mas você virou meu pensamento favorito.</p>

    <button onclick="mostrar()">Clica aqui 😳</button>

    <p id="msg">Eu amo você 💘</p>
  </div>

  <script>
    function mostrar() {
      document.getElementById("msg").style.display = "block";
    }
  </script>

</body>
</html>
